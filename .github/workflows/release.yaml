# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: Build and Release

on:
  push:
    tags:
      - "rel"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: setup uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          cache-dependency-glob: | # optional, default is **/*requirements*.txt
            pyproject.toml
            uv.lock

      - name: Build package
        run: uv build

      - name: Fetch version
        id: version
        run: |
          VERSION=$(uv workspace metadata --preview-features workspace-metadata | jq -r '. as $root | .members[] | select(.name == "lua2meta") | $root.resolution[.id].version')
          echo "version=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Delete 'release' tag
        run: |
          # Delete remote 'rel' tag
          git push origin :refs/tags/rel || true

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifactErrorsFailBuild: true
          artifacts: dist/*.whl
          commit: ${{ github.sha }}
          immutableCreate: true
          omitBody: true
          tag: ${{ steps.version.outputs.version }}
